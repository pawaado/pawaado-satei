<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>パワアド査定ツール</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <h1>パワアド査定ツール</h1>
  <button id="topResetBtn" class="danger small">入力をリセット</button>
</header>
<main>
  <section class="card select-card">
    <label>アカデミー<select id="academy"></select></label>
    <label>ジョブ<select id="job"></select></label>
  </section>

  <section class="card">
    <h2>経験点</h2>
    <div class="exp-list" id="expInputs"></div>
  </section>

  <section class="card">
    <h2>基本能力</h2>
    <div class="table-head basic-head"><span>取得済</span><span>コツLv</span><span>基本能力名</span><span>現在値</span></div>
    <div class="ability-list" id="basicInputs"></div>
  </section>

  <section class="card">
    <h2>特殊能力</h2>
    <input id="skillSearch" class="search" type="search" placeholder="特殊能力を検索">
    <div class="table-head skill-head"><span>取得済</span><span>コツLv</span><span>特殊能力名</span></div>
    <div class="skill-list" id="specialList"></div>
  </section>

  <section class="card">
    <div class="buttons">
      <button id="calcBtn">計算する</button>
      <button id="resetBtn" class="secondary">入力をリセット</button>
    </div>
  </section>

  <section class="card">
    <h2>結果</h2>
    <div id="result">条件を入力して「計算する」を押してください。</div>
  </section>

  <section class="note">
    <p>注記1：小数点以下の査定が不明であることなどから、本ツールの結果が最大値とならない場合があります。また、必殺技、アクションスキル、超特殊能力は割愛しています。あらかじめご了承ください。</p>
    <p>注記2：〜攻撃は、火攻撃、風攻撃、水攻撃のいずれかを指します。</p>
  </section>
</main>
<script src="data.js"></script>
<script src="script.js"></script>
</body>
</html>

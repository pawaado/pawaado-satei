<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>パワアド査定ツール</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <h1>パワアド査定ツール</h1>
  <p>マスターデータベース v1.1 修正版</p>
</header>
<main>
  <section class="card">
    <label>アカデミー<select id="academy"></select></label>
    <label>ジョブ<select id="job"></select></label>
  </section>
  <section class="card">
    <h2>現在の各経験点</h2>
    <div class="grid5" id="expInputs"></div>
  </section>
  <section class="card">
    <h2>現在の基本能力・コツ</h2>
    <div class="basic" id="basicInputs"></div>
  </section>
  <section class="card">
    <h2>取得済 or コツを取得した特殊能力</h2>
    <table id="specialTable">
      <thead><tr><th>コツLv</th><th>取得済</th><th>特殊能力</th></tr></thead>
      <tbody></tbody>
    </table>
    <div class="buttons">
      <button id="calcBtn">計算する</button>
      <button id="resetBtn" class="secondary">入力をリセット</button>
    </div>
  </section>
  <section class="card">
    <h2>結果</h2>
    <div id="result">条件を入力して「計算する」を押してください。</div>
  </section>
  <section class="note">
    <p>小数点以下の査定が不明であることなどから、本ツールの結果が最大値とならない場合があります。また、必殺技、アクションスキル、超特殊能力は割愛しています。あらかじめご了承ください。</p>
    <p>〜攻撃は、火攻撃、風攻撃、水攻撃のいずれかを指します。</p>
  </section>
</main>
<script src="data.js"></script>
<script src="script.js"></script>
</body>
</html>
